services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: booking_app
    restart: unless-stopped
    env_file:
      - .env

    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - booking_network

  mysql:
    image: mysql:8.0
    container_name: booking_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"   
    volumes:
      - booking_mysql_data:/var/lib/mysql
    networks:
      - booking_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: booking_nginx
    restart: unless-stopped
    ports:
      - "8090:80"   
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - booking_network

volumes:
  booking_mysql_data:

networks:
  booking_network:
    driver: bridge
